<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Reflection Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: #f8fafc; }
        .chat-container { width: 500px; height: 700px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .chat-header { font-size: 18px; font-weight: 600; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 15px; }
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; padding-right: 10px; }
        .message { max-width: 85%; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease-out forwards; }
        .bot-msg { background: rgba(255,255,255,0.1); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: linear-gradient(135deg, #3b82f6, #8b5cf6); align-self: flex-end; border-bottom-right-radius: 2px; }
        .options-area { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 14px; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.2s; font-size: 14px; }
        .option-btn:hover { background: rgba(255,255,255,0.15); border-color: #8b5cf6; transform: translateY(-2px); }
        .continue-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 14px; border: none; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .continue-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Daily Reflection Agent</div>
    <div class="chat-box" id="chatBox"></div>
    <div class="options-area" id="optionsArea"></div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const optionsArea = document.getElementById('optionsArea');
    
    let currentNodeId = null;
    let historyData = {};
    let signalsData = {};

    function addMessage(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
        div.innerText = text;
        chatBox.appendChild(div);
        setTimeout(() => { 
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }, 50);
    }

    async function loadNext(answer = "") {
        if (answer) addMessage(answer, true);
        optionsArea.innerHTML = "";

        const response = await fetch('/api/next', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ current_id: currentNodeId, answer, history: historyData, signals: signalsData })
        });
        const data = await response.json();
        
        // Add a slight delay to feel like the bot is processing
        setTimeout(() => handleNode(data.node), 600);
    }

    function handleNode(node) {
        if (!node) return;
        currentNodeId = node.id;
        
        if (node.text) addMessage(node.text);
        
        // Track signals
        if (node.signal) {
            const [axis, val] = node.signal.split(':');
            signalsData[axis] = val;
        }

        // Render options after a slight delay
        setTimeout(() => {
            if (node.type === 'question') {
                node.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => {
                        historyData[node.id] = opt;
                        loadNext(opt);
                    };
                    optionsArea.appendChild(btn);
                });
            } else if (node.type === 'reflection' || node.type === 'bridge' || node.type === 'start') {
                const btn = document.createElement('button');
                btn.className = 'continue-btn';
                btn.innerText = 'Continue';
                btn.onclick = () => loadNext("");
                optionsArea.appendChild(btn);
            } else if (node.type === 'summary') {
                const btn = document.createElement('button');
                btn.className = 'continue-btn';
                btn.innerText = 'Finish';
                btn.onclick = () => loadNext("");
                optionsArea.appendChild(btn);
            } else if (node.type === 'end') {
                optionsArea.innerHTML = "";
                const endBtn = document.createElement('button');
                endBtn.className = 'option-btn';
                endBtn.innerText = 'End Session';
                endBtn.onclick = () => {
                    optionsArea.innerHTML = "<p style='text-align:center; color:#94a3b8; font-size:14px; margin-top:10px;'>Session complete. You can close this window.</p>";
                };
                
                const continueBtn = document.createElement('button');
                continueBtn.className = 'continue-btn';
                continueBtn.innerText = 'Continue Conversation';
                continueBtn.onclick = () => {
                    showChatBar();
                };

                optionsArea.appendChild(endBtn);
                optionsArea.appendChild(continueBtn);
            }
            // Scroll down after options render to ensure message is fully visible
            setTimeout(() => { 
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 50);
        }, node.text ? 500 : 0);
    }

    function showChatBar() {
        optionsArea.innerHTML = `
            <div style="display: flex; gap: 10px; width: 100%;">
                <input type="text" id="freeInput" placeholder="Type a message..." autocomplete="off" style="flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; outline: none; font-size: 14px;">
                <button onclick="sendFreeText()" style="background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; flex-shrink: 0; transition: 0.2s;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        `;
        const input = document.getElementById('freeInput');
        input.focus();
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendFreeText();
        });
    }

    function sendFreeText() {
        const input = document.getElementById('freeInput');
        const text = input.value.trim();
        if (!text) return;
        
        addMessage(text, true);
        input.value = '';
        
        setTimeout(() => {
            addMessage("Thank you for sharing. My guided reflection logic is complete, but taking time to write out your thoughts is a great habit!");
        }, 1000);
    }

    async function start() {
        optionsArea.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Connecting to Agent...</p>";
        const res = await fetch('/api/start');
        const data = await res.json();
        optionsArea.innerHTML = "";
        handleNode(data);
    }
    
    start();
</script>
</body>
</html>
