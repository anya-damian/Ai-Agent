<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Decision Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .header-info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-info p {
            font-size: 12px;
            color: #94a3b8;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .bot-msg {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-msg {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #8b5cf6;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            width: 45px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">AI</div>
            <div class="header-info">
                <h2>Decision Assistant</h2>
                <p>Online</p>
            </div>
        </div>
        <div class="chat-box" id="chatBox">
            <!-- Messages go here -->
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your name..." autocomplete="off"
                onkeypress="handleEnter(event)">
            <button onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');

        let step = 0;
        let studentData = {
            name: null,
            attendance: null,
            study_hours: null,
            sleep_hours: null
        };

        function addMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(isUser ? 'user-msg' : 'bot-msg');
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function initChat() {
            setTimeout(() => addMessage("Hello! I am your AI Student Decision Assistant. Let's predict your result."), 300);
            setTimeout(() => addMessage("First, what is your name?"), 1000);
        }

        async function sendMessage() {
            const value = userInput.value.trim();
            if (!value) return;

            addMessage(value, true);
            userInput.value = '';

            if (step === 0) {
                studentData.name = value;
                step++;
                userInput.type = 'number';
                userInput.placeholder = 'Type a number...';
                setTimeout(() => addMessage(`Nice to meet you, ${studentData.name}! What is your attendance percentage? (0-100)`), 500);
            } else if (step === 1) {
                studentData.attendance = parseFloat(value);
                step++;
                setTimeout(() => addMessage("Great. How many hours do you study per day?"), 500);
            } else if (step === 2) {
                studentData.study_hours = parseFloat(value);
                step++;
                setTimeout(() => addMessage("Noted. And how many hours do you sleep per night?"), 500);
            } else if (step === 3) {
                studentData.sleep_hours = parseFloat(value);
                step++;
                setTimeout(() => addMessage("Analyzing your data..."), 500);

                // Call API
                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(studentData)
                    });
                    const data = await response.json();

                    setTimeout(() => {
                        if (data.prediction === 'PASS') {
                            addMessage(`🎉 Good news ${studentData.name}, my analysis indicates you will PASS!\n\n${data.message}`);
                        } else {
                            addMessage(`⚠️ Sorry ${studentData.name}, my analysis indicates you might FAIL.\n\n${data.message}`);
                        }
                    }, 1500);

                    setTimeout(() => {
                        addMessage("If you want to try again, just type your new attendance percentage to restart!");
                        step = 1; // Reset to attendance step
                    }, 3000);

                } catch (error) {
                    setTimeout(() => addMessage("Sorry, I couldn't reach the server. Is it running?"), 1000);
                    step = 1;
                }
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        initChat();
    </script>
</body>

</html>
